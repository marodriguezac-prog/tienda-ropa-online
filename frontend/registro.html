<!DOCTYPE html>

<body>

      <a href="index.html">Catalogo</a>

  <div class="form-container">

    <div id="mensaje"></div>

    <button onclick="registrarUsuario()">Registrarse</button>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesion aqui</a></p>
  </div>

  <script src="app.js"></script>
