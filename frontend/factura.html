<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @media print {
      header, footer, .no-imprimir { display: none !important; }
      body { background: #fff; color: #000; }
      .factura-container { box-shadow: none; border: none; }
    }

    .factura-container {
      max-width: 700px;
      margin: 40px auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
    }

    .factura-header {
      text-align: center;
      border-bottom: 2px solid #FFD700;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .factura-header h2 {
      color: #FFD700;
    }

    .factura-datos {
      margin-bottom: 20px;
      font-size: 14px;
      color: #ccc;
    }

    table.factura-tabla {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    table.factura-tabla th, table.factura-tabla td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    table.factura-tabla th {
      background-color: #0d0d0d;
      color: #FFD700;
    }

    .factura-total {
      text-align: right;
      font-size: 22px;
      color: #FFD700;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-imprimir {
      display: block;
      margin: 20px auto 0;
      padding: 12px 30px;
      background-color: #FFD700;
      color: #0d0d0d;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mi Tienda de Ropa</h1>
    <nav>
      <a href="index.html">Volver al catalogo</a>
    </nav>
  </header>

  <div class="factura-container" id="factura-container">
    <div class="factura-header">
      <h2>Factura de Compra</h2>
    </div>
    <div class="factura-datos" id="factura-datos"></div>
    <table class="factura-tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Talla</th>
          <th>Color</th>
          <th>Cantidad</th>
          <th>Precio Unit.</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="factura-items"></tbody>
    </table>
    <div class="factura-total" id="factura-total"></div>
    <button class="btn-imprimir no-imprimir" onclick="window.print()">Imprimir Factura</button>
  </div>

  <script src="app.js"></script>
  <script>
    cargarFactura();
  </script>
</body>
</html>
